services:
  - type: web
    name: buyer-companion-demo
    runtime: ruby
    plan: free
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec puma -C config/puma.rb"
    healthCheckPath: /up
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: SOLID_QUEUE_IN_PUMA
        value: "false"
      - key: RAILS_MASTER_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: JOBS_USERNAME
        sync: false
      - key: JOBS_PASSWORD
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: buyer-companion-demo-db
          property: connectionString

  - type: worker
    name: buyer-companion-demo-worker
    runtime: ruby
    plan: starter
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec rails solid_queue:start"
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: SECRET_KEY_BASE
        fromService:
          name: buyer-companion-demo
          type: web
          envVarKey: SECRET_KEY_BASE
      - key: RAILS_MASTER_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: buyer-companion-demo-db
          property: connectionString

databases:
  - name: buyer-companion-demo-db
    databaseName: buyer_companion_demo_production
    plan: free
